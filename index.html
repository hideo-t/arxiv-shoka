<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>秀夫のarXiv書架</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --paper: #faf7ee;
    --ink: #2a2622;
    --ink-soft: #5a544c;
    --ink-faint: #9a9287;
    --accent: #8b3a3a;
    --accent-soft: #b86b5c;
    --secondary: #4a6741;
    --line: #ddd4c4;
    --line-soft: #e8e1d3;
    --shadow: rgba(42, 38, 34, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Zen Kaku Gothic New', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.7;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(139, 58, 58, 0.04) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(74, 103, 65, 0.04) 0%, transparent 45%);
    background-attachment: fixed;
  }

  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header with stamp */
  header {
    padding: 32px 0 22px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    position: relative;
  }

  .stamp {
    position: absolute;
    top: 24px;
    right: 4px;
    width: 54px;
    height: 54px;
    background: var(--accent);
    transform: rotate(-7deg);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--paper);
    font-family: 'Noto Serif JP', serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 3px;
    writing-mode: vertical-rl;
    text-orientation: upright;
    box-shadow: 0 2px 6px rgba(139, 58, 58, 0.3);
  }

  .stamp::after {
    content: "";
    position: absolute;
    inset: 3px;
    border: 1.5px solid var(--paper);
    border-radius: 2px;
    opacity: 0.5;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 3px;
    color: var(--ink);
    line-height: 1.15;
    max-width: calc(100% - 70px);
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 3px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .tagline {
    font-size: 13.5px;
    color: var(--ink-soft);
    margin-top: 14px;
    max-width: 92%;
    line-height: 1.75;
  }

  /* Tabs */
  nav.tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 24px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    margin-left: -16px;
    margin-right: -16px;
    padding-left: 16px;
    padding-right: 16px;
  }
  nav.tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 0 0 auto;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 500;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 2px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .tab:hover { background: var(--paper); color: var(--ink); }

  .tab.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .category-header {
    margin-bottom: 22px;
    padding-left: 2px;
  }

  .category-header h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 5px;
    letter-spacing: 1px;
  }

  .category-header p {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* Paper cards */
  .papers { display: flex; flex-direction: column; gap: 12px; }

  .paper {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 18px 20px;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px var(--shadow);
    cursor: pointer;
    position: relative;
  }

  .paper:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
    border-color: var(--ink-faint);
  }

  .paper.expanded {
    cursor: default;
    border-color: var(--ink-faint);
  }

  .paper-number {
    position: absolute;
    top: 16px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 1px;
  }

  .paper-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15.5px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 10px;
    padding-right: 40px;
  }

  .paper-meta {
    display: flex;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .paper-authors {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.5;
  }

  .paper-body {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line);
  }

  .paper.expanded .paper-body { display: block; }

  .summary-section {
    margin-bottom: 16px;
  }

  .summary-section:last-child { margin-bottom: 0; }

  .summary-section h4 {
    font-family: 'Noto Serif JP', serif;
    font-size: 12.5px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 2px;
    font-weight: 600;
    border-left: 3px solid var(--accent);
    padding-left: 8px;
  }

  .summary-section p {
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.8;
    padding-left: 11px;
  }

  .summary-section ul {
    list-style: none;
    padding-left: 11px;
  }

  .summary-section li {
    font-size: 13px;
    line-height: 1.8;
    padding-left: 14px;
    position: relative;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .summary-section li::before {
    content: "―";
    position: absolute;
    left: 0;
    color: var(--ink-faint);
    font-weight: 300;
  }

  .paper-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 7px 12px;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.2s ease;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: inline-block;
    cursor: pointer;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 50px 20px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 3px;
  }

  .loading::after {
    content: "";
    animation: dots 1.4s steps(4, end) infinite;
    display: inline-block;
    width: 24px;
    text-align: left;
  }

  @keyframes dots {
    0%, 20% { content: ""; }
    40% { content: "."; }
    60% { content: ".."; }
    80%, 100% { content: "..."; }
  }

  .error {
    padding: 18px 20px;
    background: rgba(139, 58, 58, 0.04);
    border-left: 3px solid var(--accent);
    color: var(--ink);
    font-size: 13px;
    border-radius: 2px;
    line-height: 1.7;
  }

  .summary-loading {
    padding: 20px 0;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-align: center;
  }
  .summary-loading::after {
    content: "";
    animation: dots 1.4s steps(4, end) infinite;
    display: inline-block;
    width: 20px;
    text-align: left;
  }

  footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    h1 { font-size: 26px; letter-spacing: 2px; }
    .stamp { width: 44px; height: 44px; top: 20px; font-size: 13px; letter-spacing: 2px; }
    .paper { padding: 16px; }
    .paper-title { font-size: 14.5px; padding-right: 36px; }
    .tagline { font-size: 12.5px; }
    .summary-section p { font-size: 13px; }
    .summary-section li { font-size: 12.5px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="stamp">秀夫</div>
    <h1>arXiv<br>書架</h1>
    <div class="subtitle">study / shirakawa night edition</div>
    <div class="tagline">白河の机の上から、AI研究の最前線を日本語で読む書架。<br>カテゴリを選び、気になる論文をタップすると、実務家視点と技術者視点の両方で要約します。</div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="category-header" id="categoryHeader"></div>

  <div id="content"></div>

  <footer>
    arxiv.org / deepseek-chat / by hideo &amp; claude
  </footer>
</div>

<script>
const categories = [
  {
    id: 'llm-sec',
    name: 'LLM × セキュリティ',
    query: 'abs:%22vulnerability%22+AND+abs:%22language+model%22',
    description: 'ミトス系。AIによる脆弱性発見と防御の最前線。'
  },
  {
    id: 'agents',
    name: '自律エージェント',
    query: 'abs:%22autonomous+agent%22+AND+abs:%22LLM%22',
    description: 'Claude Code系。AIが自分で計画して実行する技術系譜。'
  },
  {
    id: 'local',
    name: 'ローカルLLM・蒸留',
    query: 'abs:%22knowledge+distillation%22+AND+abs:%22language+model%22',
    description: '小型化・高速化。RTX 5090で動かすための技術基盤。'
  },
  {
    id: 'safety',
    name: 'AI安全性',
    query: 'abs:%22AI+alignment%22+OR+abs:%22AI+safety%22',
    description: 'AIの制御と倫理。Anthropicの思想的背骨。'
  },
  {
    id: 'rag',
    name: '中小企業AI・RAG',
    query: 'abs:%22retrieval+augmented+generation%22',
    description: 'Park Homes FAQの源流。実装可能な知識活用の技術。'
  }
];

const cache = {
  papers: {},
  summaries: {}
};

let currentCategory = categories[0].id;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = categories.map(c =>
    `<button class="tab ${c.id === currentCategory ? 'active' : ''}" data-id="${c.id}">${c.name}</button>`
  ).join('');
  el.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCategory = btn.dataset.id;
      renderTabs();
      renderCategory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

async function renderCategory() {
  const cat = categories.find(c => c.id === currentCategory);
  const header = document.getElementById('categoryHeader');
  header.innerHTML = `<h2>${cat.name}</h2><p>${cat.description}</p>`;

  const content = document.getElementById('content');

  if (cache.papers[cat.id]) {
    renderPapers(cache.papers[cat.id]);
    return;
  }

  content.innerHTML = '<div class="loading">arxiv から取得中</div>';

  try {
    const arxivUrl = `https://export.arxiv.org/api/query?search_query=${cat.query}&start=0&max_results=15&sortBy=submittedDate&sortOrder=descending`;
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(arxivUrl)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const xmlText = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const entries = doc.querySelectorAll('entry');

    const papers = Array.from(entries).map(entry => {
      const getText = sel => entry.querySelector(sel)?.textContent?.trim() || '';
      return {
        id: getText('id'),
        title: getText('title').replace(/\s+/g, ' '),
        summary: getText('summary').replace(/\s+/g, ' '),
        published: getText('published'),
        authors: Array.from(entry.querySelectorAll('author > name')).map(n => n.textContent.trim())
      };
    });

    cache.papers[cat.id] = papers;
    renderPapers(papers);
  } catch (err) {
    content.innerHTML = `<div class="error">arxiv の読み込みに失敗しました。少し時間をおいて再読込してください。<br><span style="font-family:monospace;font-size:11px;color:var(--ink-faint)">${escapeHtml(err.message)}</span></div>`;
  }
}

function renderPapers(papers) {
  const content = document.getElementById('content');
  if (papers.length === 0) {
    content.innerHTML = '<div class="error">論文が見つかりませんでした。</div>';
    return;
  }
  content.innerHTML = `<div class="papers">${papers.map((p, i) => renderPaper(p, i)).join('')}</div>`;

  content.querySelectorAll('.paper').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.btn')) return;
      togglePaper(card);
    });
  });
}

function renderPaper(p, i) {
  const year = p.published.substring(0, 10);
  const authors = p.authors.slice(0, 3).join(', ') + (p.authors.length > 3 ? ` +${p.authors.length - 3}` : '');
  const absUrl = p.id;
  const pdfUrl = p.id.replace('/abs/', '/pdf/');
  const num = String(i + 1).padStart(2, '0');

  return `
    <div class="paper" data-idx="${i}">
      <div class="paper-number">№ ${num}</div>
      <div class="paper-title">${escapeHtml(p.title)}</div>
      <div class="paper-meta">
        <span>${year}</span>
        <span>arxiv</span>
      </div>
      <div class="paper-authors">${escapeHtml(authors)}</div>
      <div class="paper-body">
        <div class="summary-content"></div>
        <div class="paper-actions">
          <a href="${absUrl}" target="_blank" rel="noopener" class="btn">abs</a>
          <a href="${pdfUrl}" target="_blank" rel="noopener" class="btn">pdf</a>
        </div>
      </div>
    </div>
  `;
}

async function togglePaper(card) {
  const expanded = card.classList.contains('expanded');
  if (expanded) {
    card.classList.remove('expanded');
    return;
  }
  card.classList.add('expanded');

  const idx = parseInt(card.dataset.idx);
  const paper = cache.papers[currentCategory][idx];
  const summaryEl = card.querySelector('.summary-content');

  if (cache.summaries[paper.id]) {
    summaryEl.innerHTML = cache.summaries[paper.id];
    return;
  }

  summaryEl.innerHTML = '<div class="summary-loading">claude が読み込み中</div>';

  try {
    const summary = await generateSummary(paper);
    cache.summaries[paper.id] = summary;
    summaryEl.innerHTML = summary;
  } catch (err) {
    summaryEl.innerHTML = `<div class="error">要約の生成に失敗しました: ${escapeHtml(err.message)}</div>`;
  }
}

async function generateSummary(paper) {
  const prompt = `あなたは秀夫さん(高橋秀夫、「AIの町医者」)の研究秘書です。秀夫さんは1980年代にアセンブラ・COBOLをやり、30年の異業種経験を経て2024年にAIに復帰した中小企業向けAIコンサルタントです。白河と豊見城の二拠点で活動し、RTX 5090+RTX 5080のローカル環境でGemmaやNemotronを動かし、Park Homes Okinawa、ユアソリューションズ、三昌プロダクションなどを顧問しています。

以下のarXiv論文を日本語で要約してください。

【論文タイトル】
${paper.title}

【英文アブストラクト】
${paper.summary}

【出力】
以下のHTMLをそのまま返してください。前後の説明、コードブロック記号、補足コメントは一切不要です。HTMLタグ以外のテキストは日本語で、簡潔に書いてください。

<div class="summary-section">
<h4>一行で</h4>
<p>ここに論文の核心を1文で</p>
</div>

<div class="summary-section">
<h4>実務家向け</h4>
<ul>
<li>何が新しく可能になるか</li>
<li>誰が得をして誰が追い込まれるか</li>
<li>中小企業への影響・実装コスト感</li>
</ul>
</div>

<div class="summary-section">
<h4>技術者向け</h4>
<ul>
<li>手法の核・既存からの差分</li>
<li>前提スタック・必要計算資源</li>
<li>ローカル(RTX 5090クラス)で動くかどうかの見立て</li>
</ul>
</div>

<div class="summary-section">
<h4>秀夫さんへのひと言</h4>
<p>AIの町医者としての活用角度を1〜2文で</p>
</div>`;

  const response = await fetch("https://aisdr-proxy.hdxrope.workers.dev/deepseek", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "deepseek-chat",
      max_tokens: 1500,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const errText = await response.text().catch(() => '');
    throw new Error(`API ${response.status}: ${errText.substring(0, 100)}`);
  }

  const data = await response.json();
  let text = data.choices[0].message.content.trim();

  // Strip any accidental code fences
  text = text.replace(/^```(?:html)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();

  return text;
}

renderTabs();
renderCategory();
</script>
</body>
</html>
